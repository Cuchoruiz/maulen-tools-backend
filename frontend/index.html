<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DropiBot Suite - Ganadores</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    table { border-collapse: collapse; width: 100%; background: white; }
    th, td { padding: 8px 12px; border: 1px solid #ddd; text-align: left; }
    th { background: #ff9045; color: white; }
    .score { font-weight: bold; color: #2e7d32; }
    button { padding: 10px 20px; background: #ff9045; color: white; border: none; cursor: pointer; margin-left: 10px; }
    .hidden { display: none; }
    input { padding: 8px; width: 250px; }
    #msg { color: red; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="loginBox">
    <h2>Conectar a Dropi</h2>
    <button onclick="login()">Conectar</button>
    <p id="msg"></p>
  </div>

  <div id="dashboard" class="hidden">
    <h2>🏆 Productos Ganadores</h2>
    <input id="keyword" type="text" placeholder="Palabra clave (ej: parche)">
    <button onclick="buscar()">Buscar</button>
    <p id="status" style="color:gray;"></p>
    <br>
    <table id="tabla">
      <thead>
        <tr>
          <th>Score</th><th>Producto</th><th>Costo</th><th>Sugerido</th><th>Margen</th><th>Stock</th><th>Categorías</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    async function login() {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('dashboard').classList.remove('hidden');
    }

    async function buscar() {
      const keyword = document.getElementById('keyword').value.trim() || 'parche';
      const status = document.getElementById('status');
      status.textContent = 'Buscando...';
      try {
        const res = await fetch('/products/' + encodeURIComponent(keyword));
        if (!res.ok) throw new Error('Error HTTP: ' + res.status);
        const data = await res.json();
        if (!data.success) {
          status.textContent = 'Error: ' + (data.message || 'desconocido');
          return;
        }
        const products = data.products;
        const tbody = document.querySelector('#tabla tbody');
        tbody.innerHTML = '';
        if (!products || products.length === 0) {
          status.textContent = 'No se encontraron productos.';
          return;
        }
        products.forEach(p => {
          const score = (p.score != null) ? p.score : '0.0';
          const margen = (p.suggested_price && p.suggested_price > 0) ? ((p.suggested_price - (p.sale_price||0)) / p.suggested_price * 100).toFixed(1) : '0.0';
          const stock = (p.warehouse_product || []).reduce((s, w) => s + (w.stock||0), 0);
          const cats = (p.categories || []).map(c => c.name).join(', ');
          const row = document.createElement('tr');
          row.innerHTML = `
            <td class="score">${score}</td>
            <td>${p.name || ''}</td>
            <td>$${(p.sale_price || 0).toLocaleString()}</td>
            <td>$${(p.suggested_price || 0).toLocaleString()}</td>
            <td>${margen}%</td>
            <td>${stock}</td>
            <td>${cats}</td>
          `;
          tbody.appendChild(row);
        });
        status.textContent = `Mostrando ${products.length} productos.`;
      } catch (err) {
        status.textContent = 'Error: ' + err.message;
        console.error(err);
      }
    }
  </script>
</body>
</html>
